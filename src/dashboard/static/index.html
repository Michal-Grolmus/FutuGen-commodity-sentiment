<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commodity Sentiment Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- ONBOARDING -->
  <div id="onboarding" class="hidden">
    <div class="onboard-card">
      <h1>Commodity Sentiment Monitor</h1>
      <p class="subtitle">Real-time commodity impact analysis from live streams</p>
      <div class="onboard-section">
        <h3>1. Try the interactive demo</h3>
        <button onclick="startDemo()" class="btn-demo">Start Demo</button>
      </div>
      <div class="onboard-section">
        <h3>2. Or connect your API key</h3>
        <div class="key-input-row">
          <input id="api-key-input" type="password" placeholder="sk-ant-..." />
          <button onclick="saveApiKey()" class="btn-primary">Save</button>
        </div>
        <a href="https://console.anthropic.com/settings/keys" target="_blank" class="link">Get an API key &rarr;</a>
      </div>
      <div class="onboard-section">
        <h3>3. Pick a live stream or sample</h3>
        <div id="stream-picker"></div>
        <div class="custom-url-row">
          <input id="custom-url" type="text" placeholder="Or paste a YouTube Live URL..." />
          <button onclick="addCustomStream()" class="btn-primary">Add</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">
    <!-- TOP NAV (sticky) -->
    <nav class="top-nav">
      <h1>CSM</h1>
      <button id="nav-streams" class="nav-btn active" onclick="showView('streams')">Streams</button>
      <button id="nav-commodities" class="nav-btn" onclick="showView('commodities')">Commodities</button>
      <div class="nav-spacer"></div>
      <span id="nav-status" class="status-connecting">...</span>
    </nav>

    <!-- FILTERS PANEL (sticky) -->
    <div id="filters-panel" class="filters-panel">
      <div id="filters-streams" class="filters-content">
        <span class="filters-label">Filters:</span>
        <div id="filters-streams-buttons" class="filters-buttons"></div>
      </div>
      <div id="filters-commodities" class="filters-content hidden">
        <span class="filters-label">Filters:</span>
        <div id="filters-commodities-buttons" class="filters-buttons"></div>
      </div>
    </div>

    <!-- SUB-NAV: jump to section (sticky) -->
    <div id="sub-nav" class="sub-nav">
      <div id="sub-nav-streams" class="sub-nav-content"></div>
      <div id="sub-nav-commodities" class="sub-nav-content hidden"></div>
    </div>

    <!-- STREAMS VIEW -->
    <div id="view-streams" class="view">
      <div class="view-header">
        <h2>Active Streams</h2>
        <button onclick="showOnboarding()" class="btn-sm">+ Add Stream</button>
      </div>
      <div id="streams-list"></div>
      <div id="no-streams" class="empty-state">No active streams. <a href="#" onclick="showOnboarding()">Add one &rarr;</a></div>
    </div>

    <!-- COMMODITIES VIEW -->
    <div id="view-commodities" class="view hidden">
      <div class="view-header">
        <h2>Commodities</h2>
      </div>

      <section id="latest-events-section">
        <h3 class="section-title">Latest Events</h3>
        <div id="latest-events-grid"></div>
      </section>

      <div id="commodities-grid"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
